<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente de Cursos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ground:       #E8EDE8;
      --surface:      #FFFFFF;
      --accent:       #1F5E52;
      --accent-dim:   #E4F0EE;
      --accent-2:     #E8A63A;
      --user-bg:      #1F5E52;
      --user-text:    #FFFFFF;
      --text:         #111827;
      --text-muted:   #6B7B6E;
      --border:       rgba(0,0,0,0.09);
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.10);
      --shadow-md:    0 4px 16px rgba(0,0,0,0.10);
      --r:            18px;
      --r-sm:         10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #C5D4C3;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Shell ─────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      max-height: 820px;
      display: flex;
      flex-direction: column;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.07);
    }

    /* ── Header ────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-info h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .header-info p {
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #72E09A;
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
    }

    .restart-btn {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.28);
      color: rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .restart-btn:hover { background: rgba(255,255,255,0.26); }

    /* ── Messages ──────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 13px 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scroll-behavior: smooth;
      background: var(--ground);
      background-image:
        radial-gradient(circle, rgba(0,0,0,0.035) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

    /* ── Bubble group ──────────────────────────────────── */
    .msg-group {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      gap: 0;
      animation: fadeUp 0.22s ease both;
    }

    .msg-group.bot  { align-self: flex-start; }
    .msg-group.user { align-self: flex-end; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Bubbles ───────────────────────────────────────── */
    .bubble {
      padding: 10px 14px;
      font-size: 14.5px;
      line-height: 1.52;
      word-break: break-word;
    }

    .bot .bubble {
      background: var(--surface);
      color: var(--text);
      border-radius: var(--r) var(--r) var(--r) 4px;
      box-shadow: var(--shadow-sm);
    }

    .user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-radius: var(--r) var(--r) 4px var(--r);
      box-shadow: var(--shadow-sm);
    }

    /* ── Inline option buttons (WhatsApp-style) ────────── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-top: 4px;
    }

    .option-row {
      display: flex;
      gap: 3px;
    }

    .opt {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: var(--r-sm);
      padding: 9px 10px;
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      line-height: 1.3;
      transition: background 0.14s, color 0.14s, transform 0.08s;
      box-shadow: var(--shadow-sm);
    }

    .opt:hover  { background: var(--accent); color: #fff; transform: translateY(-1px); }
    .opt:active { transform: translateY(0); }

    .opt.picked {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
      pointer-events: none;
      opacity: 0.7;
    }

    .opt:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Info card ─────────────────────────────────────── */
    .info-card {
      background: var(--surface);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      animation: fadeUp 0.22s ease both;
      max-width: 82%;
      align-self: flex-start;
    }

    .card-head {
      background: var(--accent-2);
      padding: 11px 15px;
    }

    .card-head .course-name {
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
    }

    .card-head .section-tag {
      font-size: 11px;
      color: rgba(255,255,255,0.78);
      margin-top: 2px;
    }

    .card-body { padding: 10px 14px; }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }

    .info-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .info-value {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      margin-top: 2px;
      white-space: pre-wrap;
    }

    .info-value a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .info-value a:hover { text-decoration: underline; }

    /* ── Typing indicator ──────────────────────────────── */
    .typing-row {
      align-self: flex-start;
      animation: fadeUp 0.22s ease both;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--r) var(--r) var(--r) 4px;
      box-shadow: var(--shadow-sm);
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #B0BDB0;
      animation: bounce 1.3s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Date divider ──────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      color: var(--text-muted);
      padding: 4px 0 10px;
      flex-shrink: 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.1);
    }

    /* ── Mobile ────────────────────────────────────────── */
    @media (max-width: 500px) {
      .shell { border-radius: 0; max-height: 100dvh; }
    }

    @media (prefers-reduced-motion: reduce) {
      .msg-group, .info-card, .typing-row, .typing span { animation: none; }
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="avatar">🎓</div>
    <div class="header-info">
      <h1>Asistente de Cursos</h1>
      <p><span class="status-dot"></span>En línea · Responde al instante <small style="opacity:.5;font-size:.7em">v3</small></p>
    </div>
    <button class="restart-btn" onclick="restart()">↩ Inicio</button>
  </div>

  <div class="messages" id="messages"></div>
</div>

<script>
const state = { categoria: null, curso: null };
const msgEl = document.getElementById('messages');

// Fetch con timeout y retry automático (maneja cold start de Render)
async function apiFetch(url, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 20000); // 20s timeout
    try {
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (e) {
      clearTimeout(timer);
      if (attempt < retries) {
        await new Promise(r => setTimeout(r, 2000));
      } else {
        throw e;
      }
    }
  }
}

function scrollBottom() {
  setTimeout(() => { msgEl.scrollTop = msgEl.scrollHeight; }, 40);
}

// Bot message with optional inline option buttons
function botMsg(html, opts, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const group = document.createElement('div');
      group.className = 'msg-group bot';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = html;
      group.appendChild(bubble);

      if (opts && opts.length) {
        const wrap = document.createElement('div');
        wrap.className = 'options';

        for (let i = 0; i < opts.length; i += 2) {
          const row = document.createElement('div');
          row.className = 'option-row';

          const pair = [opts[i], opts[i + 1]].filter(Boolean);
          pair.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt';
            btn.textContent = o.label;
            btn.onclick = () => {
              group.querySelectorAll('.opt').forEach(b => {
                b.classList.add('picked');
                b.disabled = true;
              });
              o.action();
            };
            row.appendChild(btn);
          });
          wrap.appendChild(row);
        }
        group.appendChild(wrap);
      }

      msgEl.appendChild(group);
      scrollBottom();
      resolve();
    }, delay);
  });
}

function userMsg(text) {
  const group = document.createElement('div');
  group.className = 'msg-group user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  group.appendChild(bubble);
  msgEl.appendChild(group);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgEl.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function infoCard(curso, campo) {
  console.log('[DBG] infoCard curso.dia:', curso && curso.dia, '| curso.hora:', curso && curso.hora);
  const meta = {
    turno:     { icon: '📅', tag: 'Horario' },
    equipo:    { icon: '👥', tag: 'Equipo docente' },
    whatsapp:  { icon: '💬', tag: 'Contacto' },
    meet:      { icon: '🎥', tag: 'Clase virtual' },
    requisito: { icon: '📋', tag: 'Requisito' },
  };
  const m = meta[campo];

  let rows = '';
  if (campo === 'turno') {
    rows = `
      <div class="info-row">
        <span class="info-icon">📆</span>
        <div><div class="info-label">Día</div><div class="info-value">${curso.dia || '—'}</div></div>
      </div>
      <div class="info-row">
        <span class="info-icon">🕐</span>
        <div><div class="info-label">Hora</div><div class="info-value">${curso.hora || '—'}</div></div>
      </div>`;
  } else if (campo === 'equipo') {
    rows = `
      <div class="info-row">
        <span class="info-icon">👤</span>
        <div><div class="info-label">Profesor</div><div class="info-value">${curso.profesor || '—'}</div></div>
      </div>
      <div class="info-row">
        <span class="info-icon">🤝</span>
        <div><div class="info-label">Asistente</div><div class="info-value">${curso.asistente || '—'}</div></div>
      </div>`;
  } else if (campo === 'whatsapp') {
    const val = curso.whatsapp || '';
    const isUrl = val.startsWith('http');
    rows = `
      <div class="info-row">
        <span class="info-icon">💬</span>
        <div><div class="info-label">Enlace de grupo</div><div class="info-value">${isUrl ? `<a href="${val}" target="_blank" rel="noopener">Unirse al grupo →</a>` : (val || '—')}</div></div>
      </div>`;
  } else if (campo === 'meet') {
    const val = curso.meet || '';
    const isUrl = val.startsWith('http');
    rows = `
      <div class="info-row">
        <span class="info-icon">🎥</span>
        <div><div class="info-label">Clase virtual</div><div class="info-value">${isUrl ? `<a href="${val}" target="_blank" rel="noopener">Abrir Google Meet →</a>` : (val || '—')}</div></div>
      </div>`;
  } else if (campo === 'requisito') {
    rows = `
      <div class="info-row">
        <span class="info-icon">📋</span>
        <div><div class="info-label">Requisito</div><div class="info-value">${curso.requisito || 'Sin requisitos previos'}</div></div>
      </div>`;
  }

  const card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = `
    <div class="card-head">
      <div class="course-name">${curso.nombre}</div>
      <div class="section-tag">${m.icon} ${m.tag}</div>
    </div>
    <div class="card-body">${rows}</div>`;
  msgEl.appendChild(card);
  scrollBottom();
}

// ── Flow ────────────────────────────────────────────────────

async function start() {
  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = 'Hoy';
  msgEl.appendChild(div);

  await botMsg('¡Hola! 👋 Bienvenido al <strong>Asistente de Cursos</strong>.');
  await botMsg('¿Sobre qué categoría deseas información?', null, 380);
  await loadCategorias();
}

async function loadCategorias() {
  showTyping();
  // Si tarda más de 4s, avisar que el servidor está despertando
  const slowTimer = setTimeout(() => {
    hideTyping();
    showTyping();
    const warn = document.createElement('div');
    warn.id = 'slowWarn';
    warn.className = 'msg-group bot';
    warn.innerHTML = '<div class="bubble">⏳ Conectando con el servidor, un momento…</div>';
    msgEl.insertBefore(warn, document.getElementById('typing'));
    scrollBottom();
  }, 4000);

  try {
    const { data } = await apiFetch('/api/categorias');
    clearTimeout(slowTimer);
    hideTyping();
    document.getElementById('slowWarn')?.remove();
    if (!data?.length) {
      await botMsg('No hay categorías disponibles por ahora. Intenta más tarde.');
      return;
    }
    await botMsg('Elige una categoría:', data.map(cat => ({
      label: cat,
      action: () => seleccionarCategoria(cat),
    })));
  } catch (e) {
    clearTimeout(slowTimer);
    hideTyping();
    document.getElementById('slowWarn')?.remove();
    await botMsg('⚠️ No pude conectar con el servidor. <br><small>Toca <strong>↩ Inicio</strong> para intentar de nuevo.</small>');
  }
}

async function seleccionarCategoria(cat) {
  userMsg(cat);
  state.categoria = cat;
  showTyping();
  try {
    const { data } = await apiFetch(`/api/cursos/${encodeURIComponent(cat)}`);
    hideTyping();
    if (!data?.length) {
      await botMsg(`No hay cursos registrados en <strong>${cat}</strong> aún.`);
      await botMsg('¿Deseas ver otra categoría?', null, 300);
      await loadCategorias();
      return;
    }
    await botMsg(`<strong>${cat}</strong> — Elige un curso:`,
      data.map(c => ({ label: c.nombre, action: () => seleccionarCurso(c.id, c.nombre) }))
    );
  } catch {
    hideTyping();
    await botMsg('⚠️ Error al cargar los cursos.');
  }
}

async function seleccionarCurso(id, nombre) {
  userMsg(nombre);
  state.curso = { id, nombre };
  await botMsg(`<strong>${nombre}</strong><br>¿Qué necesitas saber?`,
    [
      { label: '📅 Turno',     action: () => mostrarInfo('turno') },
      { label: '👥 Equipo',    action: () => mostrarInfo('equipo') },
      { label: '💬 WhatsApp',  action: () => mostrarInfo('whatsapp') },
      { label: '🎥 Meet',      action: () => mostrarInfo('meet') },
      { label: '📋 Requisito', action: () => mostrarInfo('requisito') },
    ],
    300
  );
}

async function mostrarInfo(campo) {
  const labels = { turno: '📅 Turno', equipo: '👥 Equipo', whatsapp: '💬 WhatsApp', meet: '🎥 Meet', requisito: '📋 Requisito' };
  userMsg(labels[campo]);
  showTyping();
  try {
    const { data } = await apiFetch(`/api/curso/${state.curso.id}`);
    console.log('[DBG] data recibida:', JSON.stringify(data));
    hideTyping();
    infoCard(data, campo);
    setTimeout(async () => {
      await botMsg('¿Necesitas algo más de este curso?', [
        { label: '📅 Turno',        action: () => mostrarInfo('turno') },
        { label: '👥 Equipo',       action: () => mostrarInfo('equipo') },
        { label: '💬 WhatsApp',     action: () => mostrarInfo('whatsapp') },
        { label: '🎥 Meet',         action: () => mostrarInfo('meet') },
        { label: '📋 Requisito',    action: () => mostrarInfo('requisito') },
        { label: '🔙 Otros cursos', action: () => volverCursos() },
      ], 200);
    }, 600);
  } catch {
    hideTyping();
    await botMsg('⚠️ Error al obtener la información.');
  }
}

async function volverCursos() {
  userMsg('🔙 Ver otros cursos');
  await botMsg(`Volviendo a <strong>${state.categoria}</strong>…`);
  await seleccionarCategoria(state.categoria);
}

function restart() {
  msgEl.innerHTML = '';
  state.categoria = null;
  state.curso = null;
  start();
}

start();
</script>
</body>
</html>
