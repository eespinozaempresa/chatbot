<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot de Cursos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ─────────────────────────────────────── */
    :root {
      --bg:          #0f1117;
      --surface:     #181c27;
      --surface2:    #1e2436;
      --border:      #2a3050;
      --accent:      #6c8fff;
      --accent-dim:  #3b5bdb22;
      --accent-glow: #6c8fff33;
      --gold:        #f0c060;
      --text:        #dce3f5;
      --text-muted:  #7a8aaa;
      --bot-bubble:  #1e2436;
      --user-bubble: #3b5bdb;
      --chip-bg:     #232b45;
      --chip-hover:  #2e3a5c;
      --chip-border: #3b4d7a;
      --radius:      14px;
      --radius-sm:   8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Shell ──────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 520px;
      height: 100dvh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px #0008, 0 0 0 1px var(--border);
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-family: 'Lora', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      margin-right: 5px;
      box-shadow: 0 0 6px #4ade8088;
    }

    /* ── Messages ───────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Bubble ─────────────────────────────────────── */
    .bubble-wrap {
      display: flex;
      gap: 8px;
      animation: fadeUp 0.25s ease both;
    }

    .bubble-wrap.bot  { align-items: flex-start; }
    .bubble-wrap.user { align-items: flex-end; flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bubble {
      max-width: 82%;
      padding: 11px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14px;
    }

    .bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .user .bubble {
      background: var(--user-bubble);
      border-top-right-radius: 4px;
      color: #fff;
    }

    /* ── Info card ──────────────────────────────────── */
    .info-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 88%;
      animation: fadeUp 0.25s ease both;
    }

    .info-card .card-title {
      font-family: 'Lora', serif;
      font-size: 15px;
      color: var(--gold);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .info-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: flex-start;
    }

    .info-label {
      color: var(--text-muted);
      min-width: 80px;
      font-size: 12px;
      padding-top: 1px;
    }

    .info-value {
      color: var(--text);
      word-break: break-word;
    }

    .info-value a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .info-value a:hover { text-decoration: underline; }

    /* ── Chips ──────────────────────────────────────── */
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 16px;
      flex-shrink: 0;
    }

    .chip {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: var(--text);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .chip:hover {
      background: var(--chip-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .chip:active { transform: translateY(0); }

    /* ── Typing indicator ───────────────────────────── */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      width: fit-content;
      animation: fadeUp 0.25s ease both;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Restart button ─────────────────────────────── */
    .restart-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      margin: 0 16px 16px;
      width: fit-content;
      align-self: center;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .restart-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Mobile ─────────────────────────────────────── */
    @media (max-width: 540px) {
      .shell {
        border-radius: 0;
        max-height: 100dvh;
      }
    }
  </style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <div class="header">
    <div class="avatar">🎓</div>
    <div class="header-info">
      <h1>Asistente de Cursos</h1>
      <p><span class="status-dot"></span>En línea · Información académica</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Chips -->
  <div class="chips-wrap" id="chips"></div>

  <!-- Restart -->
  <button class="restart-btn" id="restartBtn" onclick="restart()">
    ↩ Volver al inicio
  </button>
</div>

<script>
// ── Estado ──────────────────────────────────────────────────
const state = {
  step: 'categoria',     // categoria → cursos → detalle → info
  categoria: null,
  curso: null,
};

// ── DOM helpers ─────────────────────────────────────────────
const msgEl   = document.getElementById('messages');
const chipsEl = document.getElementById('chips');

function scrollBottom() {
  setTimeout(() => { msgEl.scrollTop = msgEl.scrollHeight; }, 50);
}

// Burbuja del bot
function botMsg(text, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap bot';
      wrap.innerHTML = `
        <div class="bubble-avatar">🤖</div>
        <div class="bubble">${text}</div>`;
      msgEl.appendChild(wrap);
      scrollBottom();
      resolve();
    }, delay);
  });
}

// Burbuja del usuario
function userMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap user';
  wrap.innerHTML = `<div class="bubble">${text}</div>`;
  msgEl.appendChild(wrap);
  scrollBottom();
}

// Indicador de escritura
function showTyping() {
  const el = document.createElement('div');
  el.className = 'bubble-wrap bot';
  el.id = 'typing';
  el.innerHTML = `
    <div class="bubble-avatar">🤖</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  msgEl.appendChild(el);
  scrollBottom();
  return el;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// Tarjeta de información
function infoCard(curso, campo) {
  const iconos = {
    turno:    '🗓️',
    equipo:   '👥',
    whatsapp: '💬',
    meet:     '📹',
  };

  let contenido = '';
  if (campo === 'turno') {
    contenido = `
      <div class="info-row"><span class="info-label">📅 Día</span><span class="info-value">${curso.dia || '—'}</span></div>
      <div class="info-row"><span class="info-label">🕐 Hora</span><span class="info-value">${curso.hora || '—'}</span></div>`;
  } else if (campo === 'equipo') {
    contenido = `
      <div class="info-row"><span class="info-label">👤 Profesor</span><span class="info-value">${curso.profesor || '—'}</span></div>
      <div class="info-row"><span class="info-label">🤝 Asistente</span><span class="info-value">${curso.asistente || '—'}</span></div>`;
  } else if (campo === 'whatsapp') {
    const url = curso.whatsapp || '';
    contenido = `
      <div class="info-row"><span class="info-label">🔗 Enlace</span>
      <span class="info-value">${url ? `<a href="${url}" target="_blank" rel="noopener">Unirse al grupo de WhatsApp →</a>` : '—'}</span></div>`;
  } else if (campo === 'meet') {
    const url = curso.meet || '';
    contenido = `
      <div class="info-row"><span class="info-label">🔗 Enlace</span>
      <span class="info-value">${url ? `<a href="${url}" target="_blank" rel="noopener">Abrir Google Meet →</a>` : '—'}</span></div>`;
  }

  const card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = `<div class="card-title">${iconos[campo] || ''} ${curso.nombre}</div>${contenido}`;
  msgEl.appendChild(card);
  scrollBottom();
}

// Renderizar chips
function setChips(options) {
  chipsEl.innerHTML = '';
  options.forEach(({ label, action }) => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = action;
    chipsEl.appendChild(btn);
  });
}

function clearChips() { chipsEl.innerHTML = ''; }

// ── Flujo ────────────────────────────────────────────────────

async function start() {
  clearChips();
  await botMsg('¡Hola! 👋 Bienvenido al asistente de cursos.');
  await botMsg('¿Sobre qué <strong>categoría</strong> deseas información?', 400);
  await loadCategorias();
}

async function loadCategorias() {
  const t = showTyping();
  try {
    const res = await fetch('/api/categorias');
    const { data } = await res.json();
    hideTyping();

    if (!data || data.length === 0) {
      botMsg('No hay categorías disponibles por ahora. Intenta más tarde.');
      return;
    }

    setChips(data.map(cat => ({
      label: cat,
      action: () => seleccionarCategoria(cat),
    })));
  } catch {
    hideTyping();
    botMsg('⚠️ No pude conectar con el servidor. Intenta de nuevo.');
  }
}

async function seleccionarCategoria(cat) {
  userMsg(cat);
  clearChips();
  state.categoria = cat;
  state.step = 'cursos';

  const t = showTyping();
  try {
    const res = await fetch(`/api/cursos/${encodeURIComponent(cat)}`);
    const { data } = await res.json();
    hideTyping();

    if (!data || data.length === 0) {
      await botMsg(`No hay cursos registrados en <strong>${cat}</strong> aún.`);
      await botMsg('¿Deseas ver otra categoría?', 300);
      await loadCategorias();
      return;
    }

    await botMsg(`Categoría: <strong>${cat}</strong><br>Estos son los cursos disponibles:`);
    setChips(data.map(c => ({
      label: c.nombre,
      action: () => seleccionarCurso(c.id, c.nombre),
    })));
  } catch {
    hideTyping();
    botMsg('⚠️ Error al cargar los cursos.');
  }
}

async function seleccionarCurso(id, nombre) {
  userMsg(nombre);
  clearChips();
  state.curso = { id, nombre };
  state.step = 'info';

  await botMsg(`Seleccionaste: <strong>${nombre}</strong>`);
  await botMsg('¿Qué información necesitas?', 300);

  setChips([
    { label: '🗓️ Turno (día y hora)',   action: () => mostrarInfo('turno') },
    { label: '👥 Equipo docente',        action: () => mostrarInfo('equipo') },
    { label: '💬 WhatsApp del grupo',    action: () => mostrarInfo('whatsapp') },
    { label: '📹 Enlace de Meet',        action: () => mostrarInfo('meet') },
  ]);
}

async function mostrarInfo(campo) {
  const labels = {
    turno:    '🗓️ Turno (día y hora)',
    equipo:   '👥 Equipo docente',
    whatsapp: '💬 WhatsApp del grupo',
    meet:     '📹 Enlace de Meet',
  };
  userMsg(labels[campo]);
  clearChips();

  const t = showTyping();
  try {
    const res = await fetch(`/api/curso/${state.curso.id}`);
    const { data } = await res.json();
    hideTyping();

    infoCard(data, campo);

    setTimeout(() => {
      botMsg('¿Necesitas otra información del mismo curso?', 200);
      setTimeout(() => {
        setChips([
          { label: '🗓️ Turno (día y hora)',   action: () => mostrarInfo('turno') },
          { label: '👥 Equipo docente',        action: () => mostrarInfo('equipo') },
          { label: '💬 WhatsApp del grupo',    action: () => mostrarInfo('whatsapp') },
          { label: '📹 Enlace de Meet',        action: () => mostrarInfo('meet') },
          { label: '🔙 Ver otros cursos',      action: () => volverCursos() },
        ]);
      }, 500);
    }, 400);

  } catch {
    hideTyping();
    botMsg('⚠️ Error al obtener la información.');
  }
}

async function volverCursos() {
  userMsg('🔙 Ver otros cursos');
  clearChips();
  await botMsg(`Volviendo a los cursos de <strong>${state.categoria}</strong>...`);
  await seleccionarCategoria(state.categoria);
}

function restart() {
  msgEl.innerHTML = '';
  clearChips();
  state.step = 'categoria';
  state.categoria = null;
  state.curso = null;
  start();
}

// ── Init ─────────────────────────────────────────────────────
start();
</script>
</body>
</html>
